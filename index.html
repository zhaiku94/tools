<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>个人工具箱 - 导航</title>
    <style>
        :root {
            --primary-color: #3498db;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        header {
            margin: 40px 0;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            color: #1a1a1a;
        }

        header p {
            color: #7f8c8d;
            margin-top: 10px;
        }

        .nav-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .nav-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid #eee;
        }

        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }

        .nav-card h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-card p {
            margin: 0;
            font-size: 14px;
            color: #95a5a6;
            line-height: 1.4;
        }

        .icon {
            font-size: 20px;
        }

        /* 移动端适配：确保字体至少16px防止缩放 */
        @media (max-width: 600px) {
            header h1 { font-size: 22px; }
            .nav-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🛠️ 个人工具箱</h1>
        <p>轻量 · 离线 · 安全</p>
    </header>

    <div class="nav-container">

            <h3><span class="icon">🔒</span> 大文件加密</h3>
            <p>基于浏览器端的高强度文件加密工具。</p>
        </a>

        <a href="ev风格测试表.html" class="nav-card">
            <h3><span class="icon">📊</span> EV风格测试表</h3>
            <p>查看特定样式的评估与测试数据。</p>
        </a>

        <a href="zhdwc.html" class="nav-card">
            <h3><span class="icon">🖼️</span> 最后的晚餐 </h3>
            <p>圣经推理游戏</p>
        </a>

        <a href="zip文件加密.html" class="nav-card">
            <h3><span class="icon">📦</span> ZIP文件加密</h3>
            <p>在线对压缩包进行安全加固处理。</p>
        </a>

        <a href="卡通倒计时.html" class="nav-card">
            <h3><span class="icon">⏰</span> 卡通倒计时</h3>
            <p>趣味风格的时间管理与倒计时工具。</p>
        </a>

        <a href="多个正倒计时.html" class="nav-card">
            <h3><span class="icon">⏳</span> 多个正倒计时</h3>
            <p>支持同时管理多个计时任务。</p>
        </a>

        <a href="文本全能优化处理器.html" class="nav-card">
            <h3><span class="icon">📝</span> 文本全能优化处理器</h3>
            <p>格式化、清洗及批量处理文本内容。</p>
        </a>
           
           <a href="记事本加密版v1.3.html" class="nav-card">
            <h3><span class="icon">📝</span> 记事本加密版</h3>
        </a>
         <a href="网页加密离线版v1.4.html" class="nav-card">
            <h3><span class="icon">📝</span> 网页加密离线版</h3>
        </a>
           <a href="v1.0猜词游戏.html" class="nav-card">
            <h3><span class="icon">📝</span> 猜词游戏</h3>
        </a>

    </div>

    <footer style="margin-top: 50px; color: #bdc3c7; font-size: 12px;">
        &copy; 2026 离线工具集 · 部署于 GitHub Pages
    </footer>

</body>
</html>
