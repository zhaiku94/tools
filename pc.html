<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>个人工具箱 - 导航</title>
    <style>
        :root {
            --primary-color: #3498db;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        header {
            margin: 40px 0;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            color: #1a1a1a;
        }

        header p {
            color: #7f8c8d;
            margin-top: 10px;
        }

        .nav-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .nav-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid #eee;
        }

        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }

        .nav-card h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-card p {
            margin: 0;
            font-size: 14px;
            color: #95a5a6;
            line-height: 1.4;
        }

        .icon {
            font-size: 20px;
        }

        /* 移动端适配：确保字体至少16px防止缩放 */
        @media (max-width: 600px) {
            header h1 { font-size: 22px; }
            .nav-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🛠️ 个人工具箱</h1>
        <p>轻量 · 离线 · 安全</p>
    </header>

    <div class="nav-container">

         <a href="https://filedn.eu/l4jPqO0tM3NbKvg5ThVdRxp" class="nav-card">
            <h3><span class="icon">📝</span> 其他</h3>
        </a>
        

    </div>

    <footer style="margin-top: 50px; color: #bdc3c7; font-size: 12px;">
        &copy; 2026 离线工具集 · 部署于 GitHub Pages
    </footer>

</body>
</html>
